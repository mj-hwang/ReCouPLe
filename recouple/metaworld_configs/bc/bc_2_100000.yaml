alg: BehaviorCloning
alg_kwargs:
  # Configure offline steps. These aren't needed, but good to set.
  offline_steps: -1
  random_steps: 0

optim: Adam
optim_kwargs:
  lr: 0.0003

network: ActorPolicy
network_kwargs:
  actor_class: ContinuousMLPActor
  hidden_layers: [512, 512]
  ortho_init: True

checkpoint: null

eval_env: mw_push-v2

dataset: OfflineDictDataset
dataset_kwargs:
  path: offline_dataset/data_offlinerl_push-v2_gt_seed_2_100000.npz
  batch_size: 1024

processor: null

trainer_kwargs: # Arguments given to Algorithm.train
  total_steps: 500000 # The total number of steps to train
  log_freq: 500 # How often to log values
  profile_freq: 500
  eval_freq: 5000 # How often to run evals
  eval_fn: eval_policy
  eval_kwargs:
    num_ep: 25 # Number of enviornment episodes to run for evaluation, or -1 if none should be run.
  loss_metric: reward # The validation metric that determines when to save the "best_checkpoint"
  train_dataloader_kwargs:
    num_workers: 0 # Number of dataloader workers.
    batch_size: 1024

seed: nulls